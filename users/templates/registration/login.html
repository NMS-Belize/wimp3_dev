{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
    <link rel="stylesheet" href="{% static 'css/fa/all.css' %}" />
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <title>WIMP3 | Met Service Edition | Login</title>
</head>
<body id="body_login">
    <div class="container">
        <div class="row">
            <section class="vh-800" >
                <div class="container py-5 h-100">
                    <div class="row d-flex justify-content-center align-items-center h-100">
                    <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                        <div class="card shadow-2-strong" style="border-radius: 1rem;">
                        <div class="card-body p-5 text-center">
                            <img id="logo" src="{% static 'images/wimp3_logo_v2.png' %}" alt="" width="100%"  />
                            <h2 class="mb-5 mt-5">Welcome | User Login</h2>
                            <form method="post">
                                {% csrf_token %}
                                {{ form }}
                                <button class="btn btn-lg btn-primary mb-5" type="submit">Log In</button>
                            </form>
                            <img id="logo" src="{% static 'images/nms_logo.png' %}" alt="" width="100px"  />
                        </div>
                        </div>
                    </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
