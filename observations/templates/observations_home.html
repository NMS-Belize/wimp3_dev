{% extends "base.html" %}
{% load static %}
{% block title %}{{ page_name }} | WIMP3{% endblock %}
{% block content %}
<div class="row mb-5">
    <div class="col-12 d-flex flex-row mb-3">
        <div class="item_dashboard position-relative">
            <a class="position-absolute top-50 start-50 translate-middle" href="{% url 'observations:index' %}">
                <img src="{% static 'button_icons/binary-code.png' %}" alt="Weather Codes" />
                <span class="task_desc">Codes</span>
            </a>
        </div>
        <div class="item_dashboard position-relative">
            <a class="position-absolute top-50 start-50 translate-middle" href="{% url 'observations:weather_icon_list' %}">
                <img src="{% static 'button_icons/cloudy2.png' %}" alt="Weather Icons" />
                <span class="task_desc">Weather Icon List</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
